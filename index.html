<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BreathFlow</title>

<meta name="theme-color" content="#040814">

<!-- ✅ FIXED -->
<link rel="manifest" href="manifest.json">

<style>
  .waveSVG{
  position:absolute;
  inset:0;
  pointer-events:none;
}

:root{
  --bg:#040814;--text:#fff;--accent:#7dd3fc;
}

body{
  margin:0;height:100vh;overflow:hidden;
  background:radial-gradient(circle at top,#0f172a,#020617 70%);
  color:var(--text);font-family:system-ui;
  display:flex;justify-content:center;align-items:center;
}

/* HOME SCREEN */
#home{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  transition:opacity 1s;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.3);opacity:1}
  100%{transform:scale(1);opacity:.6}
}

#home img{
  width:120px;height:120px;
  z-index:2;
}

#home h2{
  margin-top:20px;
  font-size:1.2rem;
  opacity:.8;
}

/* BREATH UI */
#app{opacity:0;transition:opacity 1s}

.card{
  width:min(420px,94vw);text-align:center;
  padding:20px;border-radius:28px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
}

.ringwrap{
  position:relative;width:280px;height:280px;margin:20px auto;
}

svg{position:absolute;inset:0}

#time{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

#seconds{font-size:2rem}

button{
  margin:6px;padding:10px 15px;border:0;border-radius:10px;
  background:#1e293b;color:#fff;
}
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="home">
  <div class="glow"></div>

  <!-- ✅ FIXED IMAGE -->
  <img src="icon-192.png" alt="BreathFlow Icon">
</div>


<!-- APP -->
<div id="app">
<div class="card">
<h2>BreathFlow</h2>

<div class="ringwrap" id="ring">
<svg viewBox="0 0 300 300">
<circle cx="150" cy="150" r="130"
stroke="#1e293b" stroke-width="12" fill="none"/>
<circle class="progress"
cx="150" cy="150" r="130"
stroke="#7dd3fc" stroke-width="12"
fill="none" stroke-linecap="round"
transform="rotate(-90 150 150)"/>
</svg>

  <!-- 🌊 WAVE -->
<svg class="waveSVG" viewBox="0 0 300 300">
  <defs>
    <clipPath id="clip">
      <circle cx="150" cy="150" r="130"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <path id="wave" fill="rgba(125,211,252,0.45)"></path>
  </g>
</svg>


<div id="time">
<div class="phase">Ready</div>
<div id="seconds">0</div>
</div>
</div>

<div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

</div>
</div>

<script>
const home=document.getElementById("home");
const app=document.getElementById("app");

/* ✅ AUTO TRANSITION */
setTimeout(()=>{
  home.style.opacity=0;
  setTimeout(()=>{
    home.style.display="none";
    app.style.opacity=1;
  },1000);
},2000);

/* BREATH LOGIC */
const circle=document.querySelector('.progress');
const sec=document.getElementById('seconds');
const phaseEl=document.querySelector('.phase');
const ring=document.getElementById('ring');
  const wave = document.getElementById("wave");
let waveOffset = 0;

const r=130;
const C=2*Math.PI*r;

circle.style.strokeDasharray=C;
circle.style.strokeDashoffset=C;

const phases=[
{name:'Inhale',duration:4},
{name:'Hold',duration:7},
{name:'Exhale',duration:8}
];

const total=phases.reduce((s,p)=>s+p.duration,0);

let running=false,startTime=0,elapsedSaved=0,lastPhase="";

function vibrate(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

function ease(t){
  return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
}
function drawWave(level, t){
  const amplitude = 10;
  let y = 300 - (level * 260);

  let path = `M 0 ${y}`;

  for(let x=0;x<=300;x+=10){
    let dy = Math.sin((x+t)*0.05)*amplitude;
    path += ` L ${x} ${y + dy}`;
  }

  path += ` L 300 300 L 0 300 Z`;
  wave.setAttribute("d", path);
}
function loop(now){
if(running){

let elapsed=(now-startTime)/1000+elapsedSaved;
let t=elapsed%total;

let acc=0,phase;
for(let p of phases){
if(t<acc+p.duration){phase=p;break;}
acc+=p.duration;
}

if(phase.name!==lastPhase){
vibrate(120);
lastPhase=phase.name;
}

let pt=t-acc;
let prog=pt/phase.duration;
let s=ease(prog);
  let level;

if(phase.name==='Inhale'){
  level = s;        // rise
}
else if(phase.name==='Exhale'){
  level = 1 - s;    // fall
}
else{
  level = 1;        // full during hold
}

waveOffset += 2;
drawWave(level, waveOffset);


let stroke;

if(phase.name==='Inhale'){
stroke=s;
ring.style.transform=`scale(${1+s*0.06})`;
}
else if(phase.name==='Exhale'){
stroke=1-s;
ring.style.transform=`scale(${1-s*0.06})`;
}
else{
stroke=1;
ring.style.transform="scale(1)";
}

circle.style.strokeDashoffset=C*(1-stroke);
sec.textContent=Math.ceil(phase.duration-pt);
phaseEl.textContent=phase.name;
}

requestAnimationFrame(loop);
}

function start(){
if(!running){
running=true;
startTime=performance.now();
}
}

function pause(){
if(running){
running=false;
elapsedSaved+=(performance.now()-startTime)/1000;
}
}

function reset(){
  running=false;
  startTime=0;
  elapsedSaved=0;
  lastPhase="";

  circle.style.strokeDashoffset=C;
  sec.textContent="0";
  phaseEl.textContent="Ready";
  ring.style.transform="scale(1)";

  /* ✅ reset wave */
  waveOffset = 0;
  drawWave(0, 0);
}


requestAnimationFrame(loop);
</script>

</body>
</html>
